<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            padding: 50px;
            color: #333;
        }
        h1 {
            font-size: 3em;
        }
        p {
            font-size: 1.3em;
        }
        .heart {
            font-size: 2em;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        img {
            margin-top: 20px;
            width: 250px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <h1>Hey my love 💖</h1>
    <p>This page is just for you...</p>
    <p>You make my world brighter every day 🌍✨</p>

    <div class="heart">❤️</div>

    <p>I love you more than words can say.</p>



</body>
</html>
